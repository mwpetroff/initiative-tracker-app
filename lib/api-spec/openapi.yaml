openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: departments
    description: Department operations
  - name: initiatives
    description: Initiative operations
  - name: dependencies
    description: Dependency operations
  - name: risk-categories
    description: Risk matrix category operations
  - name: insights
    description: Dashboard and heatmap aggregates
  - name: settings
    description: Company-wide configuration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
      responses:
        "204":
          description: Deleted

  /initiatives:
    get:
      operationId: listInitiatives
      tags: [initiatives]
      summary: List initiatives
      parameters:
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InitiativeStatus"
      responses:
        "200":
          description: List of initiatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Initiative"
    post:
      operationId: createInitiative
      tags: [initiatives]
      summary: Create an initiative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiativeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"

  /initiatives/{id}:
    get:
      operationId: getInitiative
      tags: [initiatives]
      summary: Get an initiative
      parameters:
        - $ref: "#/components/parameters/InitiativeId"
      responses:
        "200":
          description: Initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
    patch:
      operationId: updateInitiative
      tags: [initiatives]
      summary: Update an initiative
      parameters:
        - $ref: "#/components/parameters/InitiativeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiativeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
    delete:
      operationId: deleteInitiative
      tags: [initiatives]
      summary: Delete an initiative
      parameters:
        - $ref: "#/components/parameters/InitiativeId"
      responses:
        "204":
          description: Deleted

  /initiatives/{id}/dependencies:
    get:
      operationId: listInitiativeDependencies
      tags: [dependencies]
      summary: List dependencies for an initiative
      parameters:
        - $ref: "#/components/parameters/InitiativeId"
      responses:
        "200":
          description: List of dependencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dependency"

  /initiatives/{id}/history:
    get:
      operationId: listInitiativeHistory
      tags: [initiatives]
      summary: List status-change history for an initiative
      parameters:
        - $ref: "#/components/parameters/InitiativeId"
      responses:
        "200":
          description: List of status changes, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InitiativeHistoryEntry"

  /dependencies:
    get:
      operationId: listDependencies
      tags: [dependencies]
      summary: List all dependencies
      responses:
        "200":
          description: List of dependencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dependency"
    post:
      operationId: createDependency
      tags: [dependencies]
      summary: Create a dependency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DependencyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dependency"

  /dependencies/{id}:
    patch:
      operationId: updateDependency
      tags: [dependencies]
      summary: Update a dependency
      parameters:
        - $ref: "#/components/parameters/DependencyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DependencyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dependency"
    delete:
      operationId: deleteDependency
      tags: [dependencies]
      summary: Delete a dependency
      parameters:
        - $ref: "#/components/parameters/DependencyId"
      responses:
        "204":
          description: Deleted

  /risk-categories:
    get:
      operationId: listRiskCategories
      tags: [risk-categories]
      summary: List risk matrix categories
      responses:
        "200":
          description: List of risk categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskCategory"
    post:
      operationId: createRiskCategory
      tags: [risk-categories]
      summary: Create a risk category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskCategory"

  /risk-categories/{id}:
    patch:
      operationId: updateRiskCategory
      tags: [risk-categories]
      summary: Update a risk category
      parameters:
        - $ref: "#/components/parameters/RiskCategoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskCategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskCategory"
    delete:
      operationId: deleteRiskCategory
      tags: [risk-categories]
      summary: Delete a risk category
      description: Fails with 409 if the category is referenced by any dependency
      parameters:
        - $ref: "#/components/parameters/RiskCategoryId"
      responses:
        "204":
          description: Deleted
        "409":
          description: Category is in use by one or more dependencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get company settings
      description: Returns the singleton company settings record, creating a default if none exists
      responses:
        "200":
          description: Company settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update company settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /insights/dashboard:
    get:
      operationId: getDashboardSummary
      tags: [insights]
      summary: Dashboard summary
      description: Aggregate counts of initiatives by department and status, plus recent activity
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /insights/heatmap:
    get:
      operationId: getDependencyHeatmap
      tags: [insights]
      summary: Dependency heatmap matrix
      description: Cross-department and external-factor dependency risk matrix
      responses:
        "200":
          description: Heatmap data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatmapData"

components:
  parameters:
    DepartmentId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    InitiativeId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    DependencyId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    RiskCategoryId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    InitiativeStatus:
      type: string
      enum: [planning, in_progress, blocked, completed, on_hold]

    InitiativePriority:
      type: string
      enum: [low, medium, high]

    RiskLevel:
      type: string
      enum: [low, medium, high, critical]

    Department:
      type: object
      required: [id, name, nameJa, colorHex, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        nameJa:
          type: ["string", "null"]
        colorHex: { type: string }
        createdAt: { type: string, format: date-time }

    DepartmentInput:
      type: object
      required: [name, colorHex]
      properties:
        name: { type: string, minLength: 1 }
        nameJa:
          type: ["string", "null"]
        colorHex: { type: string, minLength: 1 }

    DepartmentUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        nameJa:
          type: ["string", "null"]
        colorHex: { type: string, minLength: 1 }

    Initiative:
      type: object
      required:
        - id
        - title
        - description
        - departmentId
        - status
        - priority
        - owner
        - progress
        - startDate
        - targetDate
        - quarterGoal
        - quarterGoalTarget
        - createdAt
        - updatedAt
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        departmentId: { type: integer }
        status:
          $ref: "#/components/schemas/InitiativeStatus"
        priority:
          $ref: "#/components/schemas/InitiativePriority"
        owner: { type: string }
        progress: { type: integer, minimum: 0, maximum: 100 }
        startDate: { type: string, format: date }
        targetDate: { type: string, format: date }
        quarterGoal:
          type: ["string", "null"]
        quarterGoalTarget:
          type: ["integer", "null"]
          minimum: 0
          maximum: 100
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    InitiativeInput:
      type: object
      required: [title, description, departmentId, status, priority, owner, progress, startDate, targetDate]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        departmentId: { type: integer }
        status:
          $ref: "#/components/schemas/InitiativeStatus"
        priority:
          $ref: "#/components/schemas/InitiativePriority"
        owner: { type: string, minLength: 1 }
        progress: { type: integer, minimum: 0, maximum: 100 }
        startDate: { type: string, format: date }
        targetDate: { type: string, format: date }
        quarterGoal:
          type: ["string", "null"]
        quarterGoalTarget:
          type: ["integer", "null"]
          minimum: 0
          maximum: 100

    InitiativeUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        departmentId: { type: integer }
        status:
          $ref: "#/components/schemas/InitiativeStatus"
        priority:
          $ref: "#/components/schemas/InitiativePriority"
        owner: { type: string, minLength: 1 }
        progress: { type: integer, minimum: 0, maximum: 100 }
        startDate: { type: string, format: date }
        targetDate: { type: string, format: date }
        quarterGoal:
          type: ["string", "null"]
        quarterGoalTarget:
          type: ["integer", "null"]
          minimum: 0
          maximum: 100

    Dependency:
      type: object
      required: [id, initiativeId, dependsOnDepartmentId, dependsOnRiskCategoryId, riskLevel, notes, createdAt]
      properties:
        id: { type: integer }
        initiativeId: { type: integer }
        dependsOnDepartmentId:
          type: ["integer", "null"]
        dependsOnRiskCategoryId:
          type: ["integer", "null"]
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        notes: { type: string }
        createdAt: { type: string, format: date-time }

    DependencyInput:
      type: object
      required: [initiativeId, riskLevel, notes]
      properties:
        initiativeId: { type: integer }
        dependsOnDepartmentId:
          type: ["integer", "null"]
        dependsOnRiskCategoryId:
          type: ["integer", "null"]
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        notes: { type: string }

    DependencyUpdate:
      type: object
      properties:
        dependsOnDepartmentId:
          type: ["integer", "null"]
        dependsOnRiskCategoryId:
          type: ["integer", "null"]
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        notes: { type: string }

    InitiativeHistoryEntry:
      type: object
      required: [id, initiativeId, oldStatus, newStatus, changedAt]
      properties:
        id: { type: integer }
        initiativeId: { type: integer }
        oldStatus:
          $ref: "#/components/schemas/InitiativeStatus"
        newStatus:
          $ref: "#/components/schemas/InitiativeStatus"
        changedAt: { type: string, format: date-time }

    RiskCategory:
      type: object
      required: [id, name, nameJa, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        nameJa:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }

    RiskCategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        nameJa:
          type: ["string", "null"]

    RiskCategoryUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        nameJa:
          type: ["string", "null"]

    DepartmentStatusBreakdown:
      type: object
      required: [departmentId, departmentName, departmentNameJa, colorHex, total, planning, inProgress, blocked, completed, onHold]
      properties:
        departmentId: { type: integer }
        departmentName: { type: string }
        departmentNameJa:
          type: ["string", "null"]
        colorHex: { type: string }
        total: { type: integer }
        planning: { type: integer }
        inProgress: { type: integer }
        blocked: { type: integer }
        completed: { type: integer }
        onHold: { type: integer }

    RecentActivityItem:
      type: object
      required: [id, initiativeId, title, departmentName, departmentNameJa, oldStatus, newStatus, changedAt]
      properties:
        id: { type: integer }
        initiativeId: { type: integer }
        title: { type: string }
        departmentName: { type: string }
        departmentNameJa:
          type: ["string", "null"]
        oldStatus:
          $ref: "#/components/schemas/InitiativeStatus"
        newStatus:
          $ref: "#/components/schemas/InitiativeStatus"
        changedAt: { type: string, format: date-time }

    DashboardSummary:
      type: object
      required: [totalInitiatives, activeInitiatives, blockedInitiatives, overdueInitiatives, highRiskDependencies, departmentBreakdown, recentActivity]
      properties:
        totalInitiatives: { type: integer }
        activeInitiatives: { type: integer }
        blockedInitiatives: { type: integer }
        overdueInitiatives: { type: integer }
        highRiskDependencies: { type: integer }
        departmentBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentStatusBreakdown"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/RecentActivityItem"

    HeatmapColumn:
      type: object
      required: [key, label, labelJa, isExternal]
      properties:
        key: { type: string }
        label: { type: string }
        labelJa:
          type: ["string", "null"]
        isExternal: { type: boolean }

    HeatmapCellDependency:
      type: object
      required: [dependencyId, initiativeId, initiativeTitle, riskLevel, notes]
      properties:
        dependencyId: { type: integer }
        initiativeId: { type: integer }
        initiativeTitle: { type: string }
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        notes: { type: string }

    HeatmapCell:
      type: object
      required: [rowDepartmentId, columnKey, dependencyCount, maxRiskLevel, riskScore, dependencies]
      properties:
        rowDepartmentId: { type: integer }
        columnKey: { type: string }
        dependencyCount: { type: integer }
        maxRiskLevel:
          type: ["string", "null"]
          enum: [low, medium, high, critical, null]
        riskScore: { type: integer }
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapCellDependency"

    HeatmapData:
      type: object
      required: [rows, columns, cells]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Department"
        columns:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapColumn"
        cells:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapCell"

    Settings:
      type: object
      required: [id, quarterStartDate, updatedAt]
      properties:
        id: { type: integer }
        quarterStartDate: { type: string, format: date }
        updatedAt: { type: string, format: date-time }

    SettingsUpdate:
      type: object
      required: [quarterStartDate]
      properties:
        quarterStartDate: { type: string, format: date }
